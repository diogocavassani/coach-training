# CoachTraining — orquestração local (PostgreSQL + API .NET + Angular)
# Uso: a partir da pasta infra/
#   docker compose up --build
#
# Variáveis: copie .env.example para .env e ajuste se necessário.

name: coachtraining

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coach}
      POSTGRES_DB: ${POSTGRES_DB:-coachtraining}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: src/CoachTraining.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      # Quando o EF Core for configurado, use a mesma chave em AddDbContext.
      ConnectionStrings__Default: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-coachtraining};Username=${POSTGRES_USER:-coach};Password=${POSTGRES_PASSWORD:-coach}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-4200}:80"

volumes:
  postgres_data:
